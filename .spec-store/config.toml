[coverage]
min_per_file = 85.0
lcov_path = "lcov.info"
lcov_max_age_mins = 60
ratchet = true
fail_on_regression = true
exclude = [
    "src/generated/**",
    "tests/**",
    "benches/**",
]

[quality]
max_file_lines = 300
max_fn_lines = 50
max_fn_complexity = 10
max_fns_per_file = 15
max_fn_params = 5
warn_only = false
exclude = ["src/generated/**", "crates/spec-store-mcp/**"]

[reuse]
similarity_warn = 0.8500000238418579
similarity_block = 0.949999988079071

[ai]
provider = ""
model = ""

[embeddings]
provider = ""
model = ""
