name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read
  pull-requests: read

jobs:
  # ── Version consistency ──────────────────────────────────────────────
  version-check:
    name: Version Check
    uses: ./.github/workflows/version-check.yml

  # ── Lint + format + audit ────────────────────────────────────────────
  lint:
    name: Lint and Format
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-lint

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true

      - name: Security audit
        run: cargo audit || echo "::warning::cargo audit found issues, please review"

  # ── Tests + coverage ─────────────────────────────────────────────────
  test:
    name: Test + Coverage
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: |
          cargo llvm-cov \
            --workspace \
            --lcov \
            --output-path lcov.info \
            --ignore-filename-regex 'main\.rs'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 30

      # Dogfood: build from source then use own action
      - name: Install spec-store (from source)
        run: cargo install --path crates/spec-store-cli --debug

      - name: spec-store gates
        uses: ./.github/actions/check
        with:
          version: '0.4.0'
          skip-download: 'true'
          lcov-path: lcov.info
          quality-path: crates/
          catchup-path: crates/

  # ── Cross-platform build ─────────────────────────────────────────────
  build-matrix:
    name: Build (${{ matrix.os }})
    needs: [lint, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build-${{ matrix.os }}

      - name: Build workspace (release)
        run: cargo build --workspace --release

      - name: Run unit tests
        run: cargo test --workspace --lib

  # ── PR coverage comment ──────────────────────────────────────────────
  coverage-comment:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download lcov artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-lcov

      - name: Post coverage summary as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const lcov = fs.readFileSync('lcov.info', 'utf8');
            const records = lcov.split('end_of_record').filter(r => r.includes('SF:'));
            let passing = 0, failing = 0, rows = '';
            for (const r of records) {
              const sf = r.match(/SF:(.+)/)?.[1]?.trim();
              const lf = parseInt(r.match(/LF:(\d+)/)?.[1] || '0');
              const lh = parseInt(r.match(/LH:(\d+)/)?.[1] || '0');
              if (!sf || lf === 0) continue;
              const pct = (lh / lf * 100).toFixed(1);
              const ok  = parseFloat(pct) >= 85;
              if (ok) passing++; else failing++;
              rows += `| ${sf} | ${lf} | ${pct}% | ${ok ? '✅' : '❌'} |\n`;
            }
            const body = `## Coverage Report\n\n` +
              `**${passing} passing** / **${failing} failing** (threshold: 85% per file)\n\n` +
              `| File | Lines | Coverage | Status |\n` +
              `|------|-------|----------|--------|\n` + rows;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
