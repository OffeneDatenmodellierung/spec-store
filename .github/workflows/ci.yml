name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Build & Test ────────────────────────────────────────────────────────
  test:
    name: Test + Coverage Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Build
        run: cargo build --release

      - name: Run tests with coverage
        run: |
          cargo llvm-cov \
            --lcov \
            --output-path lcov.info \
            --ignore-filename-regex 'main\.rs'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
          retention-days: 7

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # Dogfood: install and run spec-store against itself
      - name: Install spec-store
        run: cargo install --path . --debug

      - name: spec-store — coverage gate (85% per file + ratchet)
        run: |
          spec-store coverage baseline --from lcov.info
          spec-store coverage check --from lcov.info

      - name: spec-store — quality gates
        run: spec-store quality check --path src/

      - name: spec-store — catchup (no unregistered functions)
        run: spec-store catchup --path src/ --fail-on-missing

  # ── 2. Clippy ──────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-clippy-${{ hashFiles('Cargo.lock') }}

      - name: Clippy — warnings as errors
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── 3. Format ──────────────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  # ── 4. Security audit ──────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit dependencies
        run: cargo audit

  # ── 5. Cross-platform build check ─────────────────────────────────────────
  build-matrix:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-build-${{ hashFiles('Cargo.lock') }}

      - name: Build (release)
        run: cargo build --release

      - name: Run unit tests
        run: cargo test --lib

  # ── 6. Coverage report comment on PR ──────────────────────────────────────
  coverage-comment:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Download lcov artifact
        uses: actions/download-artifact@v4
        with:
          name: lcov

      - name: Install cargo-llvm-cov (for report generation)
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Generate HTML report
        run: cargo llvm-cov report --html --output-dir coverage-html

      - name: Post coverage summary as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const lcov = fs.readFileSync('lcov.info', 'utf8');
            const records = lcov.split('end_of_record').filter(r => r.includes('SF:'));
            let passing = 0, failing = 0, rows = '';
            for (const r of records) {
              const sf = r.match(/SF:(.+)/)?.[1]?.trim();
              const lf = parseInt(r.match(/LF:(\d+)/)?.[1] || '0');
              const lh = parseInt(r.match(/LH:(\d+)/)?.[1] || '0');
              if (!sf || lf === 0) continue;
              const pct = (lh / lf * 100).toFixed(1);
              const ok  = parseFloat(pct) >= 85;
              if (ok) passing++; else failing++;
              rows += `| ${sf} | ${lf} | ${pct}% | ${ok ? '✅' : '❌'} |\n`;
            }
            const body = `## Coverage Report\n\n` +
              `**${passing} passing** / **${failing} failing** (threshold: 85% per file)\n\n` +
              `| File | Lines | Coverage | Status |\n` +
              `|------|-------|----------|--------|\n` + rows;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
